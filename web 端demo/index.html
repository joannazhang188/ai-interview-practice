<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI面试陪练</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <svg class="svg-sprite" aria-hidden="true">
    <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5H15v-6H9v6H4.5A1.5 1.5 0 0 1 3 19.5z"/></symbol>
    <symbol id="i-file" viewBox="0 0 24 24"><path d="M6 3h8l4 4v14H6z"/><path d="M14 3v5h5M9 13h6M9 17h6"/></symbol>
    <symbol id="i-folder" viewBox="0 0 24 24"><path d="M3 6.5h7l2 2h9v10A2.5 2.5 0 0 1 18.5 21h-13A2.5 2.5 0 0 1 3 18.5z"/></symbol>
    <symbol id="i-badge" viewBox="0 0 24 24"><path d="M12 3 5 6v5c0 4.5 3 8 7 10 4-2 7-5.5 7-10V6z"/><path d="m8 12 2.5 2.5L16 9"/></symbol>
    <symbol id="i-list" viewBox="0 0 24 24"><path d="M6 5h12M6 12h12M6 19h12"/></symbol>
    <symbol id="i-target" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="m16 8 4-4"/></symbol>
    <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 4.2-6 8-6s6.5 2 8 6"/></symbol>
    <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
    <symbol id="i-gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.3 3a7 7 0 0 0-1.7 1L5.1 6l-2 3.5L5 11a7 7 0 0 0 0 2l-1.9 1.5 2 3.5 2.4-1a7 7 0 0 0 1.7 1l.3 3h5l.3-3a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></symbol>
    <symbol id="i-bell" viewBox="0 0 24 24"><path d="M18 9a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"/><path d="M9 21h6"/></symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></symbol>
    <symbol id="i-upload" viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 16v3h16v-3"/></symbol>
    <symbol id="i-mic" viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></symbol>
    <symbol id="i-star" viewBox="0 0 24 24"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.2 6.4 20.2 7.5 14 3 9.6l6.2-.9z"/></symbol>
    <symbol id="i-chart" viewBox="0 0 24 24"><path d="M4 19V5M4 19h16"/><path d="M8 16v-5M12 16V8M16 16v-8"/></symbol>
    <symbol id="i-x" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol>
    <symbol id="i-expand" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></symbol>
  </svg>

  <aside class="sidebar">
    <div class="brand"><div class="bot"><span></span></div><strong>AI面试陪练</strong></div>
    <nav class="nav">
      <button data-page="dashboard"><svg><use href="#i-home"/></svg>工作台</button>
      <button data-page="resumes"><svg><use href="#i-file"/></svg>简历库</button>
      <button data-page="portfolio"><svg><use href="#i-file"/></svg>作品库</button>
      <button data-page="match"><svg><use href="#i-badge"/></svg>匹配度分析</button>
      <button data-page="records"><svg><use href="#i-list"/></svg>分析记录</button>
      <button data-page="training"><svg><use href="#i-x"/></svg>面试训练</button>
      <button data-page="simulation"><svg><use href="#i-user"/></svg>模拟面试</button>
      <button data-page="history"><svg><use href="#i-clock"/></svg>面试历史</button>
      <button data-page="settings"><svg><use href="#i-gear"/></svg>个人设置</button>
    </nav>
    <div class="upgrade">
      <svg><use href="#i-badge"/></svg>
      <b>升级会员</b>
      <p>解锁更多功能，助力<br>面试成功</p>
      <button>立即升级</button>
    </div>
  </aside>

  <main class="shell">
    <header class="topbar">
      <h1 id="pageTitle">工作台</h1>
      <div id="topTools" class="top-tools"></div>
      <div class="profile">
        <div class="bell"><svg><use href="#i-bell"/></svg><i>3</i></div>
        <div class="avatar"></div>
        <span>张同学</span>
        <small>⌄</small>
      </div>
    </header>
    <section id="app" class="page"></section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
